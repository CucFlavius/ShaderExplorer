<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1E2027;
        }

        #editor {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<div id="editor"></div>
<script src="vs/loader.js"></script>
<script>
    require.config({paths: {'vs': 'vs'}});

    require(['vs/editor/editor.main'], function () {
        // Register HLSL language
        monaco.languages.register({id: 'hlsl'});

        monaco.languages.setMonarchTokensProvider('hlsl', {
            keywords: [
                'if', 'else', 'for', 'while', 'do', 'switch', 'case', 'default',
                'break', 'continue', 'return', 'discard',
                'struct', 'cbuffer', 'tbuffer', 'register', 'packoffset',
                'true', 'false', 'void', 'in', 'out', 'inout', 'uniform', 'static',
                'const', 'extern', 'volatile', 'inline', 'typedef',
                'namespace', 'using', 'class'
            ],
            typeKeywords: [
                'float', 'float2', 'float3', 'float4',
                'float2x2', 'float3x3', 'float4x4', 'float3x4', 'float4x3',
                'half', 'half2', 'half3', 'half4',
                'int', 'int2', 'int3', 'int4',
                'uint', 'uint2', 'uint3', 'uint4',
                'bool', 'bool2', 'bool3', 'bool4',
                'double', 'double2', 'double3', 'double4',
                'min16float', 'min16float2', 'min16float3', 'min16float4',
                'min16int', 'min16int2', 'min16int3', 'min16int4',
                'min16uint', 'min16uint2', 'min16uint3', 'min16uint4',
                'Texture1D', 'Texture1DArray', 'Texture2D', 'Texture2DArray',
                'Texture2DMS', 'Texture2DMSArray', 'Texture3D',
                'TextureCube', 'TextureCubeArray',
                'RWTexture1D', 'RWTexture2D', 'RWTexture3D',
                'Buffer', 'RWBuffer',
                'StructuredBuffer', 'RWStructuredBuffer',
                'ByteAddressBuffer', 'RWByteAddressBuffer',
                'AppendStructuredBuffer', 'ConsumeStructuredBuffer',
                'SamplerState', 'SamplerComparisonState',
                'matrix', 'vector', 'string'
            ],
            builtins: [
                'abs', 'acos', 'all', 'any', 'asin', 'atan', 'atan2',
                'ceil', 'clamp', 'clip', 'cos', 'cosh', 'countbits', 'cross',
                'ddx', 'ddx_coarse', 'ddx_fine', 'ddy', 'ddy_coarse', 'ddy_fine',
                'degrees', 'determinant', 'distance', 'dot',
                'exp', 'exp2',
                'f16tof32', 'f32tof16', 'faceforward', 'firstbithigh', 'firstbitlow',
                'floor', 'fma', 'fmod', 'frac', 'frexp',
                'isfinite', 'isinf', 'isnan',
                'ldexp', 'length', 'lerp', 'lit', 'log', 'log10', 'log2',
                'mad', 'max', 'min', 'modf', 'mul',
                'normalize',
                'pow',
                'radians', 'rcp', 'reflect', 'refract', 'reversebits', 'round', 'rsqrt',
                'saturate', 'sign', 'sin', 'sincos', 'sinh', 'smoothstep', 'sqrt', 'step',
                'tan', 'tanh', 'transpose', 'trunc',
                'asfloat', 'asint', 'asuint'
            ],
            semantics: [
                'SV_Position', 'SV_Target', 'SV_Target0', 'SV_Target1', 'SV_Target2', 'SV_Target3',
                'SV_Depth', 'SV_VertexID', 'SV_InstanceID', 'SV_PrimitiveID',
                'SV_IsFrontFace', 'SV_SampleIndex', 'SV_Coverage', 'SV_DispatchThreadID',
                'SV_GroupID', 'SV_GroupIndex', 'SV_GroupThreadID',
                'POSITION', 'NORMAL', 'TEXCOORD', 'TEXCOORD0', 'TEXCOORD1', 'TEXCOORD2',
                'COLOR', 'COLOR0', 'COLOR1', 'TANGENT', 'BINORMAL', 'BLENDWEIGHT', 'BLENDINDICES'
            ],
            operators: [
                '=', '>', '<', '!', '~', '?', ':',
                '==', '<=', '>=', '!=', '&&', '||', '++', '--',
                '+', '-', '*', '/', '&', '|', '^', '%', '<<', '>>', '>>>',
                '+=', '-=', '*=', '/=', '&=', '|=', '^=', '%=', '<<=', '>>='
            ],
            symbols: /[=><!~?:&|+\-*\/\^%]+/,
            tokenizer: {
                root: [
                    [/[a-zA-Z_]\w*/, {
                        cases: {
                            '@typeKeywords': 'type',
                            '@keywords': 'keyword',
                            '@builtins': 'predefined',
                            '@semantics': 'annotation',
                            '@default': 'identifier'
                        }
                    }],
                    {include: '@whitespace'},
                    [/[{}()\[\]]/, '@brackets'],
                    [/@symbols/, {
                        cases: {
                            '@operators': 'operator',
                            '@default': ''
                        }
                    }],
                    [/\d*\.\d+([eE][\-+]?\d+)?[fFhH]?/, 'number.float'],
                    [/0[xX][0-9a-fA-F]+[uU]?/, 'number.hex'],
                    [/\d+[uU]?/, 'number'],
                    [/[;,.]/, 'delimiter'],
                    [/"([^"\\]|\\.)*$/, 'string.invalid'],
                    [/"/, 'string', '@string']
                ],
                whitespace: [
                    [/[ \t\r\n]+/, 'white'],
                    [/\/\*/, 'comment', '@comment'],
                    [/\/\/.*$/, 'comment']
                ],
                comment: [
                    [/[^\/*]+/, 'comment'],
                    [/\*\//, 'comment', '@pop'],
                    [/[\/*]/, 'comment']
                ],
                string: [
                    [/[^\\"]+/, 'string'],
                    [/\\./, 'string.escape'],
                    [/"/, 'string', '@pop']
                ]
            }
        });

        // Define HLSL theme colors
        monaco.editor.defineTheme('hlsl-dark', {
            base: 'vs-dark',
            inherit: true,
            rules: [
                {token: 'type', foreground: '4EC9B0'},
                {token: 'predefined', foreground: 'DCDCAA'},
                {token: 'annotation', foreground: 'D7BA7D'},
                {token: 'keyword', foreground: '569CD6'},
                {token: 'number', foreground: 'B5CEA8'},
                {token: 'number.float', foreground: 'B5CEA8'},
                {token: 'number.hex', foreground: 'B5CEA8'},
                {token: 'comment', foreground: '6A9955'},
                {token: 'string', foreground: 'CE9178'},
                {token: 'operator', foreground: 'D4D4D4'},
                {token: 'identifier', foreground: '9CDCFE'}
            ],
            colors: {
                'editor.background': '#1E2027',
                'editor.foreground': '#E0E0E6',
                'editor.lineHighlightBackground': '#252830',
                'editorCursor.foreground': '#3A8FD6',
                'editorLineNumber.foreground': '#4A4D57',
                'editorLineNumber.activeForeground': '#9A9BA6',
                'scrollbarSlider.background': '#FFFFFF20',
                'scrollbarSlider.hoverBackground': '#FFFFFF30',
                'scrollbarSlider.activeBackground': '#FFFFFF40',
                'editor.selectionBackground': '#3A8FD640',
                'editorWidget.background': '#252830',
                'editorWidget.border': '#3A3D47',
                'minimap.background': '#1E2027'
            }
        });

        var editor = monaco.editor.create(document.getElementById('editor'), {
            value: '// Open a compiled shader file (File > Open or Ctrl+O)',
            language: 'hlsl',
            theme: 'hlsl-dark',
            readOnly: true,
            automaticLayout: true,
            minimap: {enabled: true},
            fontSize: 13,
            lineNumbers: 'on',
            scrollBeyondLastLine: false,
            renderWhitespace: 'none',
            wordWrap: 'off',
            folding: true,
            glyphMargin: true,
            bracketPairColorization: {enabled: true},
            smoothScrolling: true
        });

        // Expose API to C#
        window.editorApi = {
            setValue: function (text) {
                editor.setValue(text);
            },
            getValue: function () {
                return editor.getValue();
            },
            setReadOnly: function (readOnly) {
                editor.updateOptions({readOnly: readOnly});
            },
            highlightLines: function (lines) {
                var decorations = lines.map(function (line) {
                    return {
                        range: new monaco.Range(line, 1, line, 1),
                        options: {
                            isWholeLine: true,
                            className: 'errorHighlight',
                            glyphMarginClassName: 'errorGlyph'
                        }
                    };
                });
                editor.deltaDecorations([], decorations);
            },
            revealLine: function (line) {
                editor.revealLineInCenter(line);
            },
            setLanguage: function (lang) {
                var model = editor.getModel();
                monaco.editor.setModelLanguage(model, lang);
            }
        };

        // Notify C# when content changes
        editor.onDidChangeModelContent(function () {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(JSON.stringify({
                    type: 'contentChanged',
                    value: editor.getValue()
                }));
            }
        });

        // Signal ready
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(JSON.stringify({type: 'ready'}));
        }
    });
</script>
</body>
</html>
